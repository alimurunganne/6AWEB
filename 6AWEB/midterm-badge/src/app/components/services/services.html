<div class="services-container">
  <h2>Services</h2>
  <input type="text" [(ngModel)]="searchTerm" (input)="onSearchChange()" 
         placeholder="Search by title or body..." class="search-box">
  
  <div *ngIf="!(filteredPosts$ | async)" class="loading">Loading tickets...</div>
  
  <ul *ngIf="filteredPosts$ | async as posts">
    <li *ngFor="let post of posts">
      <strong>{{ post.title | uppercase }}</strong>
      <p>{{ post.body | truncate: 80 }}</p>
    </li>
  </ul>
</div>
