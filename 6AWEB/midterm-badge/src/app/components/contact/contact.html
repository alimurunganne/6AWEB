<div class="container">
  <h1>Contact</h1>
  <div class="form-section">
    <form class="contact-form">
      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="formData.name" name="name" required placeholder="JANE DOE">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="formData.email" name="email" required placeholder="jane@example.com">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea [(ngModel)]="formData.message" name="message" rows="3" placeholder="Testing 1-2-3..."></textarea>
      </div>
      <button type="button" (click)="onSubmit()" class="submit-btn">Submit</button>
    </form>
  </div>

  <div class="form-preview" *ngIf="showPreview">
    <h3>Form Preview</h3>
    <p><strong>Name:</strong> {{ formData.name | uppercase }}</p>
    <p><strong>Email:</strong> {{ formData.email }}</p>
    <p><strong>Message:</strong> {{ formData.message | truncate: 200 }}</p>
  </div>
</div>
